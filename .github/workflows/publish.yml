name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Require main for TestPyPI
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "TestPyPI publishing must run from main, not $GITHUB_REF." >&2
            exit 1
          fi

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Verify package metadata
        run: |
          args=()
          if [[ "$GITHUB_EVENT_NAME" == "release" ]]; then
            args+=(--expected-tag "${{ github.event.release.tag_name }}")
          fi
          python scripts/verify_release_artifacts.py "${args[@]}"
          python -m twine check dist/*

      - name: Upload verified distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/sahara-memory
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish verified distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          skip-existing: true

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sahara-memory
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish verified distributions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
