name: Native Artifacts

on:
  workflow_dispatch:
    inputs:
      smoke_with_index:
        description: "Run bundle smoke test with embedding/index/search validation"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos-apple-silicon:
    name: Build macOS Apple Silicon bundle
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install native build dependencies
        run: python -m pip install -e ".[all,native]"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          with Path("pyproject.toml").open("rb") as handle:
              print("v" + tomllib.load(handle)["project"]["version"])
          PY
          )"
          actual="${GITHUB_REF#refs/tags/}"
          if [[ "$actual" != "$expected" ]]; then
            echo "Release tag $actual does not match package version $expected." >&2
            exit 1
          fi

      - name: Build one-folder bundle
        run: python scripts/build_macos_bundle.py

      - name: Package and verify native artifact
        run: |
          args=()
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event.inputs.smoke_with_index }}" == "true" ]]; then
            args+=(--with-index)
          fi
          python scripts/package_native_artifacts.py "${args[@]}"

      - name: Upload native artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: dist/native-artifacts/
          if-no-files-found: error
          retention-days: 7

  macos-installer:
    name: Build signed macOS installer
    if: startsWith(github.ref, 'refs/tags/')
    needs: macos-apple-silicon
    runs-on: macos-14
    environment: macos-installer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Download verified native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-macos-arm64
          path: dist/native-artifacts/

      - name: Restore bundle
        run: |
          mkdir -p dist/native
          tar -xzf dist/native-artifacts/*.tar.gz -C dist/native

      - name: Import Developer ID certificates
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLICATION_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_CERTIFICATE_BASE64 }}
          INSTALLER_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_CERTIFICATE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_SIGNING_KEYCHAIN_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/sahara-signing.keychain-db"
          app_cert="$RUNNER_TEMP/developer-id-application.p12"
          installer_cert="$RUNNER_TEMP/developer-id-installer.p12"

          echo "$APPLICATION_CERTIFICATE_BASE64" | base64 --decode > "$app_cert"
          echo "$INSTALLER_CERTIFICATE_BASE64" | base64 --decode > "$installer_cert"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$app_cert" -P "$CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign -k "$keychain"
          security import "$installer_cert" -P "$CERTIFICATE_PASSWORD" -A -T /usr/bin/pkgbuild -k "$keychain"
          security list-keychains -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain"

      - name: Build signed and notarized installer
        env:
          MACOS_DEVELOPER_ID_APPLICATION_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION_IDENTITY }}
          MACOS_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.MACOS_DEVELOPER_ID_INSTALLER_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          bundle="dist/native/$(python scripts/build_macos_bundle.py --print-name)"
          python scripts/build_macos_installer.py --bundle "$bundle" --notarize

      - name: Verify signed installer
        run: |
          python scripts/build_macos_installer.py --verify-only
          pkgutil --check-signature dist/native-installers/*.pkg
          spctl -a -vv -t install dist/native-installers/*.pkg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64-installer
          path: dist/native-installers/
          if-no-files-found: error
          retention-days: 7

  windows-x64:
    name: Build Windows x64 bundle
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install native build dependencies
        run: python -m pip install -e ".[all,native]"

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          expected="$(python - <<'PY'
          import tomllib
          from pathlib import Path
          with Path("pyproject.toml").open("rb") as handle:
              print("v" + tomllib.load(handle)["project"]["version"])
          PY
          )"
          actual="${GITHUB_REF#refs/tags/}"
          if [[ "$actual" != "$expected" ]]; then
            echo "Release tag $actual does not match package version $expected." >&2
            exit 1
          fi

      - name: Build one-folder bundle
        run: python scripts/build_windows_bundle.py

      - name: Package and verify native artifact
        shell: pwsh
        run: |
          $packageArgs = @()
          if ("${{ github.event_name }}" -eq "push" -or "${{ github.event.inputs.smoke_with_index }}" -eq "true") {
            $packageArgs += "--with-index"
          }
          python scripts/package_native_artifacts.py --platform windows-x64 @packageArgs

      - name: Upload native artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x64
          path: dist/native-artifacts/
          if-no-files-found: error
          retention-days: 7

  windows-installer:
    name: Build signed Windows installer
    if: startsWith(github.ref, 'refs/tags/')
    needs: windows-x64
    runs-on: windows-latest
    environment: windows-installer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Download verified native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x64
          path: dist/native-artifacts/

      - name: Restore bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/native | Out-Null
          Expand-Archive -Path dist/native-artifacts/*.zip -DestinationPath dist/native -Force

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build signed installer
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE_BASE64 }}
          WINDOWS_CODESIGN_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERTIFICATE_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: |
          $bundle = "dist/native/$(python scripts/build_windows_bundle.py --print-name)"
          python scripts/build_windows_installer.py --bundle $bundle --sign

      - name: Verify signed installer
        shell: pwsh
        run: |
          python scripts/build_windows_installer.py --verify-only
          $signature = Get-AuthenticodeSignature dist/native-installers/*.exe
          if ($signature.Status -ne "Valid") {
            $signature | Format-List
            exit 1
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x64-installer
          path: dist/native-installers/
          if-no-files-found: error
          retention-days: 7

  publish-release-assets:
    name: Publish native release assets
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos-apple-silicon
      - macos-installer
      - windows-x64
      - windows-installer
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: native-macos-arm64
          path: dist/release-assets/native-macos-arm64/

      - name: Download macOS installer artifact
        uses: actions/download-artifact@v4
        with:
          name: native-macos-arm64-installer
          path: dist/release-assets/native-macos-arm64-installer/

      - name: Download Windows bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x64
          path: dist/release-assets/native-windows-x64/

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x64-installer
          path: dist/release-assets/native-windows-x64-installer/

      - name: Upload native assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          for attempt in {1..30}; do
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" == "30" ]]; then
              echo "GitHub Release $RELEASE_TAG was not found. Publish the release before uploading native assets." >&2
              exit 1
            fi
            sleep 10
          done

          mapfile -t assets < <(find dist/release-assets -type f | sort)
          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No native release assets found." >&2
            exit 1
          fi

          printf 'Uploading native release asset: %s\n' "${assets[@]}"
          gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
